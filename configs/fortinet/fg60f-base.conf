# Fortigate 60F - Configuration de base
# Projet : homelab-vlan-refactor-configs
# Source : Transcription iMot3k - VLAN Grand Remplacement
# Adapter les interfaces selon votre matériel

config system global
    set hostname "HOMELAB-FG"
    set admin-sport 8443
    set admin-https-ssl-versions tlsv1-2
end

config system interface
    edit "port1"
        set ip 192.168.1.99 255.255.255.0
        set allowaccess https ping
        set description "PORT-SECOURS-RECOVERY"
    next
    edit "lag1"
        set vdom "root"
        set interface "port3" "port4"
        set lacp-mode active
        set lacp-speed 1G
        set description "LAG-CISCO-2960X"
    next
    edit "vlan10"
        set interface "lag1"
        set vlanid 10
        set ip 10.20.10.254 255.255.255.0
        set description "VLAN-ADMIN"
        set allowaccess https ping ssh
    next
    edit "vlan50"
        set interface "lag1"
        set vlanid 50
        set ip 10.20.50.254 255.255.255.0
        set description "VLAN-PC"
    next
    edit "vlan100"
        set interface "lag1"
        set vlanid 100
        set ip 10.20.100.254 255.255.255.0
        set description "VLAN-IOT"
    next
    edit "vlan200"
        set interface "lag1"
        set vlanid 200
        set ip 10.20.200.254 255.255.255.0
        set description "VLAN-VOIP"
    next
    edit "vlan1000"
        set interface "lag1"
        set vlanid 1000
        set ip 10.20.1000.254 255.255.255.0
        set description "VLAN-MERDOUILLE-TRANSITION"
    next
end

config firewall policy
    edit 1
        set name "VLAN-ADMIN-TO-WAN"
        set srcintf "vlan10"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
    edit 2
        set name "MDNS-SPOITFY-CONNECT"
        set srcintf "vlan10"
        set dstintf "vlan50"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set utm-status enable
        set multicast-policy enable
    next
end

config system dhcp server
    edit 1
        set interface "vlan10"
        set dns-service default
        set default-gateway 10.20.10.254
        set netmask 255.255.255.0
        config ip-range
            edit 1
                set start-ip 10.20.10.100
                set end-ip 10.20.10.200
            next
        end
    next
end
