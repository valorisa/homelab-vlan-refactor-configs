! Cisco Catalyst 2960X - Configuration Trunk & LAG
! Projet : homelab-vlan-refactor-configs
! Source : Transcription iMot3k - VLAN Grand Remplacement
! Adapter les ports selon votre câblage

hostname HOMELAB-SW01
!
! Création des VLANs
vlan 10,50,100,200,99,1000
 name VLAN10-ADMIN
 name VLAN50-PC
 name VLAN100-IOT
 name VLAN200-VOIP
 name VLAN99-NATIVE
 name VLAN1000-MERDOUILLE
!
! Configuration LAG vers Fortinet (ports 45-46)
interface range GigabitEthernet1/0/45-46
 description LAG-FORTINET-VIOLET
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,50,100,200,1000
 channel-group 1 mode active
 spanning-tree portfast trunk
end
!
! Configuration Port-Channel
interface Port-channel1
 description LAG-FORTINET-PRIMARY
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,50,100,200,1000
end
!
! Configuration port pour Ubiquiti AP (exemple port 1)
interface GigabitEthernet1/0/1
 description AP-UBIQUITI-U7-LITE-01
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,50,100,200,1000
 spanning-tree portfast trunk
end
!
! Configuration port pour Proxmox (exemple port 10)
interface GigabitEthernet1/0/10
 description PROXMOX-SERVER-ORANGE
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,50,100,200,1000
end
!
! Configuration port pour MikroTik 10Gb (exemple port 47)
interface GigabitEthernet1/0/47
 description MIKROTIK-10GB-SFP-BLUE
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,50,100,200,1000
end
!
! Activation DHCP Relay
ip dhcp relay information option
!
! Sauvegarde automatique
write memory
